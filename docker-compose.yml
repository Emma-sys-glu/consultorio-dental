version: "3.9"

services:
  postgres_principal:
    image: postgres:16
    container_name: postgres_consultorio_1
    restart: always
    environment:
      POSTGRES_DB: consultorio_dental
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5434:5432"
    volumes:
      - postgres_principal_data:/var/lib/postgresql/data

  postgres_respaldo:
    image: postgres:16
    container_name: postgres_consultorio_2
    restart: always
    environment:
      POSTGRES_DB: consultorio_dental
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - postgres_respaldo_data:/var/lib/postgresql/data

volumes:
  postgres_principal_data:
  postgres_respaldo_data: